<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="scoreboard">
            <div class="score">
                <h2>Player</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="score">
                <h2>Computer</h2>
                <p id="computerScore">0</p>
            </div>
        </div>
        
        <div class="game-board">
            <div id="leftPaddle" class="paddle left-paddle"></div>
            <div id="ball" class="ball"></div>
            <div id="rightPaddle" class="paddle right-paddle"></div>
            
            <!-- Center line -->
            <div class="center-line"></div>
        </div>
        
        <div class="controls">
            <p>Use <strong>Arrow Keys</strong> (↑/↓) or <strong>Mouse</strong> to move your paddle</p>
            <button id="startBtn" class="btn">Start Game</button>
            <button id="resetBtn" class="btn">Reset Score</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
